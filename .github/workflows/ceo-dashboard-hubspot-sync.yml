name: CEO Dashboard HubSpot Sync

on:
  workflow_dispatch:
    inputs:
      as_of_date:
        description: "As-of date (YYYY-MM-DD). Leave empty to use runner date."
        required: false
        default: ""
      dry_run:
        description: "Do not write output files"
        required: true
        type: boolean
        default: true
  schedule:
    # Monday-Friday 01:35 UTC
    - cron: "35 1 * * 1-5"

permissions:
  contents: read

jobs:
  sync-hubspot-commercial:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run HubSpot sync
        shell: bash
        env:
          HUBSPOT_PRIVATE_APP_TOKEN: ${{ secrets.HUBSPOT_PRIVATE_APP_TOKEN }}
          HUBSPOT_QUALIFIED_STAGE_IDS: ${{ secrets.HUBSPOT_QUALIFIED_STAGE_IDS }}
          HUBSPOT_REGION_TARGETS_JSON: ${{ secrets.HUBSPOT_REGION_TARGETS_JSON }}
          CEO_DASHBOARD_CURRENCY: ${{ secrets.CEO_DASHBOARD_CURRENCY }}
        run: |
          set -euo pipefail

          missing=()
          [[ -z "${HUBSPOT_PRIVATE_APP_TOKEN:-}" ]] && missing+=("HUBSPOT_PRIVATE_APP_TOKEN")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 2
          fi

          as_of_date="${{ github.event.inputs.as_of_date }}"
          dry_run="${{ github.event.inputs.dry_run || 'true' }}"

          args=(
            "--output-json" "reports/ceo_dashboard/hubspot_source_latest.json"
            "--history-csv" "reports/ceo_dashboard/hubspot_metrics_history.csv"
          )

          if [[ -n "${as_of_date}" ]]; then
            args+=("--as-of-date" "${as_of_date}")
          fi
          if [[ "${dry_run}" == "true" ]]; then
            args+=("--dry-run")
          fi

          python scripts/sync_ceo_dashboard_from_hubspot.py "${args[@]}" | tee hubspot-sync-output.json

      - name: Validate sync payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from json import JSONDecoder
          from pathlib import Path

          allowed_regions = {"GKA", "CHN", "SGP", "MYS", "PHL", "THI", "IDO", "LAT"}
          output_path = Path("hubspot-sync-output.json")
          text = output_path.read_text(encoding="utf-8")

          # sync output may include non-JSON tail lines in non-dry runs.
          decoder = JSONDecoder()
          payload = None
          for i, ch in enumerate(text):
              if ch != "{":
                  continue
              try:
                  payload, _ = decoder.raw_decode(text[i:])
                  break
              except json.JSONDecodeError:
                  continue

          if payload is None:
              raise SystemExit("Validation failed: no JSON payload found in hubspot-sync-output.json")

          totals = ((payload.get("metrics") or {}).get("company_totals") or {})
          won_ytd = float(totals.get("won_revenue_ytd") or 0)
          next90 = float(totals.get("next_90d_forecast") or 0)
          if won_ytd <= 0:
              raise SystemExit(f"Validation failed: won_revenue_ytd must be > 0, got {won_ytd}")
          if next90 <= 0:
              raise SystemExit(f"Validation failed: next_90d_forecast must be > 0, got {next90}")

          regions = ((payload.get("metrics") or {}).get("region_breakdown") or [])
          observed = {str(row.get("region") or "").strip() for row in regions if row.get("region")}
          bad = sorted(r for r in observed if r not in allowed_regions)
          if bad:
              raise SystemExit(
                  "Validation failed: non-CEO region codes found: "
                  + ",".join(bad)
              )

          print("Validation passed.")
          print(f"won_revenue_ytd={won_ytd}")
          print(f"next_90d_forecast={next90}")
          print(f"regions={','.join(sorted(observed))}")
          PY

      - name: Upload sync outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ceo-dashboard-hubspot-sync
          path: |
            hubspot-sync-output.json
            reports/ceo_dashboard/hubspot_source_latest.json
            reports/ceo_dashboard/hubspot_metrics_history.csv

      - name: Write run summary
        if: always()
        shell: bash
        run: |
          {
            echo "## CEO Dashboard HubSpot Sync"
            echo "- Status: ${{ job.status }}"
            echo "- As-of date: ${{ github.event.inputs.as_of_date || 'runner date' }}"
            echo "- Dry run: ${{ github.event.inputs.dry_run || 'true' }}"
            echo "- Output JSON: reports/ceo_dashboard/hubspot_source_latest.json"
            echo "- History CSV: reports/ceo_dashboard/hubspot_metrics_history.csv"
            echo "- Required secret: HUBSPOT_PRIVATE_APP_TOKEN"
            echo "- Optional secret: HUBSPOT_QUALIFIED_STAGE_IDS"
            echo "- Optional secret: HUBSPOT_REGION_TARGETS_JSON"
          } >> "$GITHUB_STEP_SUMMARY"
